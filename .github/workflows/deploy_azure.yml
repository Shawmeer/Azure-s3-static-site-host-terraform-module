# Azure workflow file

name: Deploy to Azure Storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_REGION: eastus
  STORAGE_ACCOUNT_NAME: samirazurestaticsite
  RESOURCE_GROUP_NAME: azure-static-site-rg

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: static-site-react/package-lock.json

      - name: Install dependencies
        working-directory: ./static-site-react
        run: npm ci

      - name: Build React app
        working-directory: ./static-site-react
        run: npm run build

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'

      - name: Upload to Azure Blob Storage $web container
        run: |
          az storage blob upload-batch \
            --source ./static-site-react/dist \
            --destination '$web' \
            --account-name ${{ env.STORAGE_ACCOUNT_NAME }}

      - name: Get static website endpoint
        id: website
        run: |
          ENDPOINT=$(az storage account show \
            --name ${{ env.STORAGE_ACCOUNT_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --query "primaryEndpoints.web" \
            --output tsv)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "Static website: $ENDPOINT"

      - name: Deploy success message
        run: |
          echo "✅ Azure deployment completed!"
          echo "🌐 Website URL: ${{ steps.website.outputs.endpoint }}"